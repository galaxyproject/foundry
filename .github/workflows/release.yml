name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run npm publish with --dry-run (no upload)"
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write # for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package versions
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          tag="${GITHUB_REF##refs/tags/v}"
          for pkg in packages/foundry packages/summarize-nextflow; do
            ver=$(node -p "require('./$pkg/package.json').version")
            if [ "$ver" != "$tag" ]; then
              echo "::error::$pkg version $ver does not match tag v$tag"
              exit 1
            fi
          done

      - name: Typecheck packages
        run: npm run packages-typecheck

      - name: Build packages
        run: npm run packages-build

      - name: Test packages
        run: npm run packages-test

      - name: Smoke-test package tarballs
        run: npm run smoke:packages

      - name: Publish (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          pnpm --filter '@galaxy-foundry/summarize-nextflow' publish --access public --no-git-checks --provenance --dry-run
          pnpm --filter '@galaxy-foundry/foundry' publish --access public --no-git-checks --provenance --dry-run

      - name: Publish to npm
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        # summarize-nextflow ships first so foundry's `workspace:*` rewrite
        # resolves to a published version on the registry.
        run: |
          pnpm --filter '@galaxy-foundry/summarize-nextflow' publish --access public --no-git-checks --provenance
          pnpm --filter '@galaxy-foundry/foundry' publish --access public --no-git-checks --provenance
