# Nextflow fixture corpus for summarize-nextflow / gxwf skill research.
#
# Each entry pins a pipeline at a specific commit SHA so research results
# are reproducible. Update `tag` + `sha` together when bumping.
#
# Required fields: name, repo, sha, flavor, tier, notes.
# Optional fields: tag (omit for HEAD-pinned pipelines without releases).
#
# Flavors:
#   nf-core - follows the nf-core template (modules/nf-core/, subworkflows/nf-core/,
#             nextflow_schema.json, per-module meta.yml, nf-test under tests/).
#   adhoc   - any DSL2 pipeline that does not follow the nf-core template.
#             Used to stress-test summarize-nextflow against non-nf-core
#             conventions (custom layouts, missing schema/meta, non-`main.nf`
#             entrypoints, alternate test conventions, non-bio domains).
#
# Tiers (rough size buckets, both flavors):
#   tiny    - minimal, fast to fully review; bootstrap / smoke tests
#   small   - mostly linear, few branches; clean patterns
#   large   - many processes/profiles or heavy config; stresses edge cases

pipelines:
  - name: nf-core/demo
    flavor: nf-core
    tier: tiny
    repo: https://github.com/nf-core/demo.git
    tag: 1.1.0
    sha: 45904cb9d12db3d89900e6c479fe604ef71b297b
    notes: >
      Minimal nf-core template pipeline (FastQC + MultiQC). Good for
      bootstrapping the review skill and regression-testing output format.

  - name: nf-core/fetchngs
    flavor: nf-core
    tier: small
    repo: https://github.com/nf-core/fetchngs.git
    tag: 1.12.0
    sha: 8ec2d934f9301c818d961b1e4fdf7fc79610bdc5
    notes: >
      SRA/ENA/GEO/DDBJ metadata + FASTQ fetcher. Small, mostly linear,
      exercises remote data handling and param surface.

  - name: nf-core/rnaseq
    flavor: nf-core
    tier: large
    repo: https://github.com/nf-core/rnaseq.git
    tag: 3.24.0
    sha: 47b3b0d3daad69e99d45c9e2dd8db19ee28307a1
    notes: >
      Flagship RNA-seq pipeline. Multiple aligners/quantifiers, heavy
      modules.config, many profiles. Hard mode for the review skill.

  - name: nf-core/bacass
    flavor: nf-core
    tier: small
    repo: https://github.com/nf-core/bacass.git
    tag: 2.5.0
    sha: 76e4b12cacdc242891ea57e723c5e273f4ac71b4
    notes: >
      Bacterial assembly + annotation. Modest size, clean process
      structure, good mid-tier example between demo and rnaseq.

  - name: nf-core/hlatyping
    flavor: nf-core
    tier: small
    repo: https://github.com/nf-core/hlatyping.git
    tag: 2.2.0
    sha: 3237d20e7e611d8bbf8c37e637202dfe8a23e996
    notes: >
      HLA typing (OptiType). Small, focused, single-purpose — useful
      for exercising param surface + container mapping without branching.

  - name: nf-core/sarek
    flavor: nf-core
    tier: large
    repo: https://github.com/nf-core/sarek.git
    tag: 3.8.1
    sha: 4bd2948f98c5bf7b785c91cf6708fffccab25467
    notes: >
      Variant calling (germline/somatic). Many toggleable callers +
      aligners, heavy config, distinct flavor from rnaseq hard-mode.

  - name: nf-core/taxprofiler
    flavor: nf-core
    tier: large
    repo: https://github.com/nf-core/taxprofiler.git
    tag: 2.0.0
    sha: fa1aab03875c090c0594af7c2bbe22ada6c12391
    notes: >
      Metagenomic taxonomic profiling across many profilers. Heavy
      branching, different domain from rnaseq/sarek — stresses the
      incompatibility report on parallel-tool patterns.

  # ----- ref-data complexity bridge (nf-core) -----
  # Small/medium pipelines staged on rungs of a reference-data
  # complexity ladder. Used to scope which ref-data patterns the
  # cast/emulation can handle and which need design work. See the
  # bridge-walkthrough issue for per-rung open questions.

  - name: nf-core/smrnaseq
    flavor: nf-core
    tier: small
    repo: https://github.com/nf-core/smrnaseq.git
    tag: 2.4.1
    sha: cb0af579b24cb8d5a3accd87b2f14ea93fe04832
    notes: >
      Small-RNA seq. Bridge rung: small companion bundle (genome
      FASTA + miRBase mature/hairpin + GTF). All paths user-supplied;
      no key→bundle resolution. Useful step up from L1 (single ref)
      to L2 (coordinated multi-file ref).

  - name: nf-core/atacseq
    flavor: nf-core
    tier: small
    repo: https://github.com/nf-core/atacseq.git
    tag: 2.1.2
    sha: 1a1dbe52ffbd82256c941a032b0e22abbd925b8a
    notes: >
      ATAC-seq. Bridge rung: iGenomes-keyed reference resolution
      (--genome GRCh38 → bundle of FASTA/GTF/BED/blacklist/etc.).
      Smaller and more focused than rnaseq; good for isolating the
      genome-key→bundle pattern from aligner-choice sprawl.

  - name: nf-core/funcscan
    flavor: nf-core
    tier: small
    repo: https://github.com/nf-core/funcscan.git
    tag: 3.0.0
    sha: fa9db018e528ffb5149cdde928e2fa24e7c546fe
    notes: >
      Antimicrobial-resistance / biosynthetic-gene-cluster scanning
      across multiple HMM and sequence DBs. Bridge rung: multi-DB
      named-bundle pattern, smaller than taxprofiler. Stresses
      "user supplies several named DBs" without taxprofiler's
      profiler-tool branching.

  # ----- nf-core, reference-data-light cluster -----
  # Small/focused pipelines whose primary inputs are user files, not
  # genome bundles. Useful for scoping summarize-nextflow / cast paths
  # that don't need to resolve igenomes-style references.

  - name: nf-core/multiplesequencealign
    flavor: nf-core
    tier: small
    repo: https://github.com/nf-core/multiplesequencealign.git
    tag: 1.1.1
    sha: 79724dac3d240b9bb7684532d3fe238b42f6a4b4
    notes: >
      MSA + benchmarking across many aligners (T-Coffee, MAFFT, MUSCLE,
      …). Inputs are user FASTA(s); no genome reference. Clean
      many-tool fan-out for stress-testing parallel-tool patterns
      without ref-data noise.

  - name: nf-core/proteinfamilies
    flavor: nf-core
    tier: small
    repo: https://github.com/nf-core/proteinfamilies.git
    tag: 2.3.0
    sha: db4b0aab636c47a3a8e5c769149d9a9fdfd670c2
    notes: >
      Protein FASTAs → clustered families. Self-contained, no genome
      reference. Companion to multiplesequencealign for a second
      no-ref protein-domain pipeline.

  - name: nf-core/bamtofastq
    flavor: nf-core
    tier: tiny
    repo: https://github.com/nf-core/bamtofastq.git
    tag: 2.2.0
    sha: 869832186b25d2ccbcd31d5f69edacc1ba32b718
    notes: >
      BAM/CRAM → FASTQ. Pure conversion. Optional fasta + fai params
      (only required when input is CRAM); igenomes-aware. Good L1
      ref-data example: a single small reference, sometimes optional.

  - name: nf-core/createtaxdb
    flavor: nf-core
    tier: small
    repo: https://github.com/nf-core/createtaxdb.git
    tag: 3.0.0
    sha: e561e64257492bb337a4ade1555ecb772156a0c2
    notes: >
      Builds taxonomic DBs (Kraken2, Centrifuge, KrakenUniq, …) from
      input genome FASTAs. *Produces* reference data rather than
      consuming it — natural counterpart to taxprofiler. Useful for
      reasoning about ref-data lifecycle in Galaxy data managers.

  - name: nf-core/references
    flavor: nf-core
    tier: small
    repo: https://github.com/nf-core/references.git
    tag: "0.1"
    sha: 3ab25b0cdadc6a5440405ef20118e09e5f82dfa4
    notes: >
      Meta-pipeline that *generates* reference bundles (indexes,
      annotations) from input genomes. Same nf-core skeleton as the
      consumer pipelines but inverse data-flow direction. Good for
      ref-data lifecycle scoping.

  # ----- ad-hoc DSL2 pipelines (non-nf-core) -----
  # Pinned to stress-test summarize-nextflow against pipelines that lack
  # nf-core conventions: no nextflow_schema.json, no per-module meta.yml,
  # custom layouts, alternate test conventions, non-`main.nf` entrypoints,
  # non-bio domains.

  - name: CRG-CNAG/CalliNGS-NF
    flavor: adhoc
    tier: tiny
    repo: https://github.com/CRG-CNAG/CalliNGS-NF.git
    sha: 9e7ebf04455a24877a92c87216b9629ee2b6088d
    notes: >
      CRG-authored GATK RNA-seq variant caller. Single-author style, no
      nextflow_schema.json, no per-module meta.yml, no nf-test, no
      modules/nf-core/. Stresses the minimal-pipeline path. HEAD-pinned
      (no upstream releases).

  - name: labsyspharm/mcmicro
    flavor: adhoc
    tier: small
    repo: https://github.com/labsyspharm/mcmicro.git
    sha: c06c56deb7b87c80e172d38e9321051728cf77f0
    notes: >
      Whole-slide microscopy pipeline (image domain, not NGS). Has a
      nextflow_schema.json but no nf-core module layout, no meta.yml,
      no nf-test. Multi-entrypoint (roadie.nf, exemplar.nf alongside
      main.nf). HEAD-pinned.

  - name: JaneliaSciComp/nf-demos
    flavor: adhoc
    tier: tiny
    repo: https://github.com/JaneliaSciComp/nf-demos.git
    sha: 0c447f1b401b7f43dc3916129448530842e00d4b
    notes: >
      Janelia n5/zarr image-processing pipelines. Non-bioinformatics
      domain. No schema, no modules/nf-core, no meta.yml, no tests.
      Uses git submodules (external-modules/). HEAD-pinned.

  - name: ZuberLab/crispr-process-nf
    flavor: adhoc
    tier: small
    repo: https://github.com/ZuberLab/crispr-process-nf.git
    tag: v2.0.0
    sha: c88efe7486b2667f9c80de787a68ad40c6c7a950
    notes: >
      CRISPR screening pipeline (IMP Vienna). Custom test/ dir (not
      tests/), no schema, no meta.yml, no nf-test. Tag-released.

  - name: biocorecrg/MOP2
    flavor: adhoc
    tier: small
    repo: https://github.com/biocorecrg/MOP2.git
    sha: 91aea3fd94cd27095a839a3db96c6620a27c06d8
    notes: >
      CRG Master-of-Pores 2 ONT pipeline. Multi-pipeline monorepo
      (mop_preprocess, mop_mod, mop_tail, mop_consensus). Uses git
      submodule (BioNextflow/), Singularity-first, local_modules.nf
      pattern. No schema, no meta.yml. Stresses non-`main.nf`-rooted
      layouts. HEAD-pinned.

  - name: replikation/What_the_Phage
    flavor: adhoc
    tier: large
    repo: https://github.com/replikation/What_the_Phage.git
    tag: v1.2.4
    sha: aeb341738c31dabf2129e7d6ce2ed0b9c4cabe83
    notes: >
      Phage identification pipeline. Custom phage.nf entrypoint (no
      main.nf). workflows/ + flat modules/ (not nf-core layout).
      Per-tool Dockerfiles in phage-tool-Dockerfiles/. ~111 .nf files;
      large process count. Stresses non-`main.nf` entrypoint detection.

  - name: epi2me-labs/wf-human-variation
    flavor: adhoc
    tier: small
    repo: https://github.com/epi2me-labs/wf-human-variation.git
    tag: v2.8.0
    sha: bb8b526d97e0bbb169ba0fa3596eb5d844b927a8
    notes: >
      Oxford Nanopore (epi2me-labs) human variant-calling pipeline.
      Has a nextflow_schema.json plus epi2me-specific
      output_definition.json, but no nf-core module layout, no
      meta.yml, no nf-test. Different schema dialect than nf-core —
      good schema-handling stress.

  - name: ncbi/egapx
    flavor: adhoc
    tier: large
    repo: https://github.com/ncbi/egapx.git
    tag: v0.5.2
    sha: 40ec7362576e4b93fa9c5bf0a6c400d9502b8a63
    notes: >
      NCBI eukaryotic genome annotation. Sources live under nf/ not
      project root (entrypoint not at top level). Uses subworkflows/
      without subworkflows/nf-core/. No schema, no meta.yml, no
      nf-test. Stresses non-standard root layout from non-academic
      provenance.

  - name: nextflow-io/rnaseq-nf
    flavor: adhoc
    tier: tiny
    repo: https://github.com/nextflow-io/rnaseq-nf.git
    tag: v1.2
    sha: de77a134696b06b9833d8fffcbc68afebced3746
    notes: >
      Canonical Seqera RNA-seq training pipeline (Paolo Di Tommaso).
      No nf-core template, no schema, no per-module meta.yml. Ships
      its own tiny ggal transcriptome under data/, so technically L1
      ref-data but bundled. Useful adhoc tiny baseline distinct from
      CalliNGS-NF.

  - name: seqeralabs/nf-canary
    flavor: adhoc
    tier: tiny
    repo: https://github.com/seqeralabs/nf-canary.git
    tag: 0.2.0
    sha: cd458e9f13f3f38858ac54e880450392a6fab838
    notes: >
      Infrastructure-smoke pipeline. Pure language/feature exercises
      (success, failure, file create, retry, …); no biology, no
      reference data. Useful as a non-bio sanity baseline for
      summarize-nextflow output shape.

# IWC corpus — single rolling repo, no tag. Pin SHA from main.
# Materialized into iwc-src/ then cleaned + converted to format2 under iwc-format2/
# by scripts/build-iwc.sh (uses gxwf via @galaxy-tool-util/cli).
iwc:
  repo: https://github.com/galaxyproject/iwc.git
  ref: main
  sha: deafc4876f2c778aaf075e48bd8e95f3604ccc92
  notes: >
    galaxyproject/iwc — Intergalactic Workflow Commission curated Galaxy
    workflows (.ga). Cleaned + converted to format2 for fixture use.
