# meta_tags.yml — controlled tag vocabulary.
# Validator injects keys into meta_schema.yml at runtime.
# Hierarchy is purely textual (slash-delimited).
# See INITIAL_ARCHITECTURE.md §4.

# --- Note-type tags (every note carries exactly one) ---
mold:
  description: "Mold note (source artifact for casting)"
pattern:
  description: "Pattern reference page (Galaxy workflow construction patterns)"
source-pattern:
  description: "Source-system pattern page that maps an input workflow idiom to target implementation patterns"
cli-tool:
  description: "CLI tool index page (install metadata for a tool, aggregating its cli-command subcommand notes)"
cli-command:
  description: "CLI command reference page (one note per command/subcommand)"
pipeline:
  description: "Pipeline note — ordered Mold sequence composing a harness journey"
research/component:
  description: "Background synthesis on an external component or topic"
research/infrastructure:
  description: "Project-infrastructure research for developer-facing systems, integrations, and adjacent tools"
research/design-problem:
  description: "Identified design problem awaiting resolution"
research/design-spec:
  description: "Design specification for a Foundry component"
schema:
  description: "Schema note (renderable JSON Schema reference, vendored or Foundry-authored)"
prompt:
  description: "Prompt wrapper note (metadata and human framing for raw prompt sidecars)"

# --- Prompt classifications ---
prompt/galaxy-internal:
  description: "Prompt sourced from Galaxy's internal agent prompt library"
# --- CLI affiliation (for cli-tool and cli-command notes) ---
cli/gxwf:
  description: "gxwf CLI (Galaxy workflow design-time tooling)"
cli/planemo:
  description: "Planemo CLI (Galaxy workflow runtime testing)"
cli/cwltool:
  description: "cwltool reference runner / validator for CWL"
cli/cwl-utils:
  description: "cwl-utils CLI (cwl-normalizer and friends)"
cli/foundry:
  description: "Foundry-shipped CLI bins (validators and harness tooling)"

# --- Mold axis tags (provisional — may graduate to typed fields) ---
source/paper:
  description: "Mold consumes paper-shaped input"
source/interview:
  description: "Mold or pipeline starts from a free-form user interview"
source/freeform:
  description: "Mold consumes a normalized free-form source summary"
source/nextflow:
  description: "Mold consumes Nextflow-shaped input"
source/cwl:
  description: "Mold consumes CWL-shaped input"
source/snakemake:
  description: "Source-pattern or Mold consumes Snakemake-shaped input"
target/galaxy:
  description: "Mold targets Galaxy"
target/cwl:
  description: "Mold targets CWL"
tool/gxwf:
  description: "Mold wraps gxwf CLI surface"
tool/planemo:
  description: "Mold wraps Planemo CLI surface"

# --- iwc/* (subject-area: IWC corpus categories) ---
# Seeded once from top-level dirs of <iwc-clone>/workflows/.
# See INITIAL_CORPUS_INGESTION.md.
# Add iwc/<category> entries here as patterns and Molds reference them.

# --- topic/* (Foundry-authored pattern/MOC topics) ---
topic/galaxy-transform:
  description: "Galaxy data-shape transformation pattern maps"
topic/collection-transform:
  description: "Galaxy collection transformation pattern map"
topic/tabular-transform:
  description: "Galaxy tabular transformation pattern map"
