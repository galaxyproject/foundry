class: GalaxyWorkflow
label: BREW3R
doc: Extends 3' ends of gene annotations using BAM files (from STAR alignments) and a reference GTF. Specifically designed for 3'-biased sequencing techniques like 10X scRNA-seq or BRB-seq that primarily capture transcript 3' ends. The BREW3R tool enhances annotations by using evidence from RNA-seq data to improve 3' UTR definitions, which is particularly important for accurate quantification in single-cell and bulk RNA-seq experiments.
inputs:
  - id: Input gtf
    type: data
    optional: false
    format:
      - gtf
    position:
      top: 0
      left: 0
  - id: BAM collection
    type: collection
    collection_type: list
    optional: false
    format:
      - bam
    doc: BAM collection for example output of STAR
    position:
      top: 92.84911999999173
      left: 52
  - id: strandedness
    type: string
    optional: false
    restrictions:
      - stranded - forward
      - stranded - reverse
      - unstranded
    position:
      top: 186.84911999999173
      left: 122
  - id: minimum coverage
    type: int
    optional: true
    default: 10
    position:
      top: 269.84911999999173
      left: 229
  - id: minimum FPKM for merge
    type: float
    optional: true
    default: 1
    position:
      top: 383.34911999999173
      left: 278
outputs:
  - id: extended_gtf
    outputSource: BREW3R.r
steps:
  - id: _unlabeled_step_5
    tool_id: toolshed.g2.bx.psu.edu/repos/iuc/map_param_value/map_param_value/0.2.0
    tool_version: 0.2.0
    tool_shed_repository:
      changeset_revision: 5ac8a4bf7a8d
      name: map_param_value
      owner: iuc
      tool_shed: toolshed.g2.bx.psu.edu
    in:
      - id: input_param_type|input_param
        source: strandedness
    out:
      - id: output_param_text
        hide: true
    tool_state:
      input_param_type:
        type: text
        input_param:
          __class__: ConnectedValue
        mappings:
          - from: stranded - forward
            to: --fr
          - from: stranded - reverse
            to: --rf
          - from: unstranded
            to: ""
      output_param_type: text
      unmapped:
        on_unmapped: fail
    position:
      top: 150.5
      left: 437
  - id: Unstranded
    label: Unstranded
    tool_id: toolshed.g2.bx.psu.edu/repos/iuc/map_param_value/map_param_value/0.2.0
    tool_version: 0.2.0
    tool_shed_repository:
      changeset_revision: 5ac8a4bf7a8d
      name: map_param_value
      owner: iuc
      tool_shed: toolshed.g2.bx.psu.edu
    in:
      - id: input_param_type|input_param
        source: strandedness
    out:
      - id: output_param_boolean
        hide: true
    tool_state:
      input_param_type:
        type: text
        input_param:
          __class__: ConnectedValue
        mappings:
          - from: unstranded
            to: "true"
      output_param_type: boolean
      unmapped:
        on_unmapped: default
        default_value: "false"
    position:
      top: 394.3499755859375
      left: 882
  - id: assembl with StringTie
    label: assembl with StringTie
    tool_id: toolshed.g2.bx.psu.edu/repos/iuc/stringtie/stringtie/2.2.3+galaxy0
    tool_version: 2.2.3+galaxy0
    tool_shed_repository:
