  - id: merge assembled transcripts
    label: merge assembled transcripts
    tool_id: TODO
    in:
      - id: TODO_assembled_gtfs
        source: assembl with StringTie/output_gtf
      - id: TODO_min_fpkm
        source: minimum FPKM for merge
    out:
      - id: TODO_merged_gtf
    _plan_state: |
      Merge per-sample StringTie assemblies into a single non-redundant transcript
      set. Permissive thresholds — the downstream BREW3R.r step does its own
      filtering on the merged annotation, so this merge should not drop low-FPKM
      transcripts the user might still want extended.

      Knobs that matter:
      - min FPKM: surfaced as workflow input `minimum FPKM for merge` (default 1).
      - minimum transcript / isoform / coverage thresholds: prefer permissive
        defaults (e.g. min_len ~50, min_iso ~0.01, min_cov ~0, min_tpm ~1).
      - no reference guide GTF for the merge — we merge purely from assembly
        evidence; the reference GTF is only used downstream by BREW3R.r.
    _plan_context: |
      Upstream: this is the StringTie "merge" mode invocation
      (`stringtie --merge`). Consumes the per-sample GTFs emitted by the
      preceding `assembl with StringTie` step and produces a single consensus
      GTF that feeds BREW3R.r's overlap analysis.

      Tooling expectations:
      - conda: bioconda::stringtie (same package as the assembly step;
        sibling wrapper in the IUC StringTie suite).
      - container: quay.io/biocontainers/stringtie (suite container).
      - Tool Shed: an IUC `stringtie_merge` wrapper exists at
        toolshed.g2.bx.psu.edu/repos/iuc/stringtie/stringtie_merge — discover
        before authoring.
      - precondition: input is one or more GTFs from StringTie assemblies of
        the same reference; the wrapper accepts either a single GTF or a list
        collection of GTFs depending on which IUC wrapper variant is picked.
    _plan_in: |
      Two semantic input ports:
      - `assembled_gtfs` (TODO_assembled_gtfs): list of per-sample StringTie
        assembly GTFs from `assembl with StringTie/output_gtf`. Wrapper-side
        port name likely `input_gtf` (IUC stringtie_merge convention) and
        likely accepts either a single GTF or a list collection.
      - `min_fpkm` (TODO_min_fpkm): float threshold from workflow input
        `minimum FPKM for merge`. Wrapper-side port name likely `min_fpkm`.
    _plan_out: |
      One semantic output port: the merged consensus GTF.
      Wrapper-side port name likely `out_gtf` (IUC stringtie_merge convention).
      Downstream consumer: BREW3R.r reads it on its `gtf_to_overlap` input.
      History UI hint: the implemented step should set `hide: true` and may
      rename to a descriptive label like "merged StringTie gtf" — this is an
      intermediate file the user shouldn't see by default.
    position:
